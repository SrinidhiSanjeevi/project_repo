version: "3.9"

services:

  backend:
    build:
      context: ./backend

    container_name: auth-backend

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend

    container_name: auth-frontend

    ports:
      - "3000:80"

    depends_on:
      - backend

    restart: unless-stopped