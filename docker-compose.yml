version: "3.9"

networks:
  homeease-net:
    driver: bridge

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: homeease-backend
    image: homeease-backend:latest

    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}

    ports:
      - "5000:5000"

    networks:
      - homeease-net

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: homeease-frontend
    image: homeease-frontend:latest

    ports:
      - "3000:80"

    networks:
      - homeease-net

    depends_on:
      backend:
        condition: service_healthy

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3